<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punti Emergenza Rimini - PWA</title>

  <meta name="theme-color" content="#b71c1c" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 12px;
      border-radius: 14px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
      max-width: 320px;
    }

    .panel h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #b71c1c;
      color: white;
      text-decoration: none;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .legend {
      margin-top: 12px;
      font-size: 13px;
    }

    .legend div {
      margin-bottom: 5px;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="panel">
  <h2>Punti Emergenza Rimini</h2>

  <button class="btn" onclick="toggleMode()">
    Modalità Giorno/Notte
  </button>

  <div id="nearest" style="margin-top:12px;">
    Ricerca posizione...
  </div>

  <div class="legend">
    <div><span class="dot" style="background:#1976d2"></span>Aree di attesa</div>
    <div><span class="dot" style="background:#2e7d32"></span>Aree di assistenza</div>
    <div><span class="dot" style="background:#f57c00"></span>Aree di ammassamento</div>
    <div><span class="dot" style="background:#c62828"></span>Strutture sanitarie</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    }

  markerGroup.addTo(map);

    assistenza: '#2e7d32',

  { name:'AAS017 - Rivazzurra', type:'assistenza', lat:44.031482, lon:12.599390 },
  { name:'AAS018 - Miramare Erba', type:'assistenza', lat:44.030476, lon:12.610279 },
  { name:'AAS019 - Miramare Sintetico', type:'assistenza', lat:44.028260, lon:12.613756 },

  // AMMASSAMENTO
  { name:'AMM001 - Protezione Civile', type:'ammassamento', lat:44.057790, lon:12.538881 },
  { name:'AMM002 - Toys Center', type:'ammassamento', lat:44.025051, lon:12.551093 },

  // SANITARIA
  { name:'SAN001 - Ex Questura', type:'sanitaria', lat:44.054650, lon:12.578700 }
];

  // MARKER
  points.forEach(p => {
    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 7,
      color: colors[p.type],
      fillColor: colors[p.type],
      fillOpacity: 0.95,
      weight: 2
    }).addTo(markerGroup);

    marker.bindPopup(`
      <b>${p.name}</b><br><br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}" target="_blank">
        Naviga con Google Maps
      </a>
    `);
  });

  // DISTANZA
  function distance(lat1, lon1, lat2, lon2) {
    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
      Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(lat1*Math.PI/180) *
      Math.cos(lat2*Math.PI/180) *
      Math.sin(dLon/2) *
      Math.sin(dLon/2);

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // GEOLOCALIZZAZIONE
  navigator.geolocation.getCurrentPosition(pos => {

    const userLat = pos.coords.latitude;
    const userLon = pos.coords.longitude;

    map.setView([userLat, userLon], 13);

    L.marker([userLat, userLon])
      .addTo(map)
      .bindPopup('La tua posizione')
      .openPopup();

    let nearest = null;
    let minDist = Infinity;

    points.forEach(p => {
      const d = distance(userLat, userLon, p.lat, p.lon);

      if(d < minDist) {
        minDist = d;
        nearest = p;
      }
    });

    document.getElementById('nearest').innerHTML = `
      <b>Punto più vicino:</b><br>
      ${nearest.name}<br>
      Distanza: ${minDist.toFixed(2)} km<br>

      <a class="btn"
         href="https://www.google.com/maps/dir/?api=1&destination=${nearest.lat},${nearest.lon}"
         target="_blank">
         Naviga
      </a>
    `;

  }, () => {

    document.getElementById('nearest').innerHTML = `
      GPS non disponibile
    `;
  });

  // MODALITÀ GIORNO/NOTTE
  function toggleMode() {

    if(map.hasLayer(darkTiles)) {
      map.removeLayer(darkTiles);
      lightTiles.addTo(map);

    } else {
      map.removeLayer(lightTiles);
      darkTiles.addTo(map);
    }
  }

  // SOS
  const sos = L.control({ position:'bottomright' });

  sos.onAdd = function() {

    const div = L.DomUtil.create('div');

    div.innerHTML = `
      <a href="tel:112"
         style="
           background:#c62828;
           color:white;
           padding:16px 18px;
           border-radius:50%;
           font-size:24px;
           text-decoration:none;
           box-shadow:0 2px 12px rgba(0,0,0,.5);
         ">
         SOS
      </a>
    `;

    return div;
  };

  sos.addTo(map);

  // OFFLINE PWA
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // TEST BASE
  console.assert(points.length > 0, 'Errore: nessun punto caricato');
  console.assert(typeof toggleMode === 'function', 'Errore toggleMode');
  console.assert(markerGroup instanceof L.LayerGroup, 'Errore markerGroup');
</script>

</body>
</html>
